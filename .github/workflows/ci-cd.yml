# ── MindTrace CI/CD Pipeline ──────────────────────────────────────────────────
# Author: Aye Khin Khin Hpone (Yolanda Lim) · ST125970
#
# Triggers:
#   - Push to main   → lint + build + push Docker image
#   - Pull request    → lint + build (no push)
#
# Docker Hub: yolandalim/125970-mindtrace
# Secrets required:
#   DOCKERHUB_USERNAME  — Docker Hub username
#   DOCKERHUB_TOKEN     — Docker Hub access token (not password)
# ──────────────────────────────────────────────────────────────────────────────

name: CI/CD — Build & Deploy MindTrace

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: yolandalim/125970-mindtrace

jobs:

  # ─────────────── Job 1: Lint & Smoke Test ───────────────
  lint-and-test:
    name: Lint & Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8 (critical errors only)
        run: |
          pip install flake8
          flake8 app.py train_pipeline.py --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Smoke test — import & model load
        run: |
          python -c "
          import joblib, os
          assert os.path.exists('model.pkl'), 'model.pkl not found'
          model = joblib.load('model.pkl')
          print(f'Model loaded: {type(model).__name__}')
          print('Smoke test passed')
          "

  # ─────────────── Job 2: Build & Push Docker Image ───────────────
  docker-build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### 🚀 Docker Image Pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.DOCKER_IMAGE }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.DOCKER_IMAGE }}:${{ steps.vars.outputs.sha_short }}\`" >> "$GITHUB_STEP_SUMMARY"
